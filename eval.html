<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CosmeDB — 엔진 평가 (골든셋)</title>
<style>
:root{--bg:#f0f3f8;--s1:#fff;--s2:#f5f7fb;--bd:#d4dcea;--bd2:#b8c4d8;--txt:#1a2440;--txt2:#4a5e7a;--txt3:#8a9bb8;--acc:#c8102e;--grn:#0a9050;--yel:#c07800;--navy:#1a2440;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',system-ui,sans-serif;font-size:13px;line-height:1.6;padding:0 0 40px}
.top{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--acc)}
.top h1{font-size:15px;font-weight:800}
.top a{margin-left:auto;color:rgba(255,255,255,.7);font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.25);padding:5px 12px;border-radius:6px}
.wrap{max-width:1080px;margin:18px auto;padding:0 16px;display:flex;flex-direction:column;gap:18px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px}
.card h2{font-size:13px;font-weight:800;margin-bottom:10px}
.hint{font-size:11px;color:var(--txt3);margin-bottom:12px;line-height:1.7}
label{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px}
input,textarea,select{width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--bd2);border-radius:6px;background:var(--s2);font-family:inherit;margin-bottom:10px}
button{cursor:pointer;font-family:inherit;font-weight:700;border-radius:6px;border:1px solid var(--bd2);padding:7px 14px;font-size:12px;background:var(--s2);color:var(--txt2)}
button.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
button:disabled{opacity:.5;cursor:not-allowed}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--bd)}
th{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.metric-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.metric{flex:1;min-width:130px;background:var(--s2);border-radius:8px;padding:10px 12px}
.metric .v{font-size:22px;font-weight:900;font-family:var(--mono)}
.metric .l{font-size:9.5px;color:var(--txt3)}
.ok{color:var(--grn);font-weight:700}.no{color:var(--acc);font-weight:700}.part{color:var(--yel);font-weight:700}
.store-tag{font-size:10px;color:var(--txt3)}
.del{color:var(--acc);cursor:pointer;font-size:11px;background:none;border:none;padding:0}
.prog{font-size:11px;color:var(--txt2)}
.tiny{font-size:10px;color:var(--txt3)}
</style>
</head>
<body>
<div class="top">
  <h1>🎯 CosmeDB 엔진 평가 — 골든셋 기반</h1>
  <a href="index.html">← 검색엔진으로</a>
</div>
<div class="wrap">

  <div class="card">
    <h2>① 골든셋 등록 <span class="store-tag" id="store-tag"></span></h2>
    <div class="hint">과거에 <b>실제로 성사된</b> 소싱 사례를 등록하세요. 의뢰(제품유형/타겟제품)와, 그때 실제로 낙점·거래한 제조원(공장)명을 적으면 됩니다. 엔진이 그 공장을 결과에 얼마나 잘 찾아내는지 측정합니다.</div>
    <div class="grid2">
      <div>
        <label>의뢰 (제품유형 또는 타겟제품)</label>
        <input id="g-query" placeholder="예: 동결건조 세럼">
      </div>
      <div>
        <label>입력 유형</label>
        <select id="g-type"><option value="product_type">신규 제품유형</option><option value="target_product">타겟 제품</option></select>
      </div>
    </div>
    <label>정답 제조원(공장) — 쉼표로 구분</label>
    <input id="g-makers" placeholder="예: ㈜한국콜마, 코스맥스">
    <label>메모 (선택)</label>
    <input id="g-note" placeholder="예: 2024년 A브랜드 앰플 건, 최종 낙점">
    <button class="pri" onclick="addCase()">+ 사례 추가</button>
  </div>

  <div class="card">
    <h2>② 등록된 골든셋 (<span id="case-count">0</span>)</h2>
    <div id="cases"></div>
  </div>

  <div class="card">
    <h2>③ 평가 실행</h2>
    <div class="hint">각 사례에 대해 실제 파이프라인(분류 → 식약처 품목보고 + 제조업체 검색 + 유사제품)을 돌려, 정답 제조원이 후보에 포함되는지 확인합니다. 사례가 많으면 API 호출이 많아 시간이 걸립니다.</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <button class="pri" id="run-btn" onclick="runEval()">▶ 평가 실행</button>
      <span class="prog" id="prog"></span>
    </div>
    <div id="summary"></div>
    <div id="results"></div>
  </div>

</div>

<script>
const API_BASE = localStorage.getItem('cosmedb_api_base') || '';
const LS_GOLDEN = 'cosmedb_golden_v1';
let _shared=null, _cases=[];

function normName(s){return (s||'').replace(/주식회사|유한회사|\(주\)|\(유\)|㈜/g,'').replace(/코리아|korea/gi,'').replace(/\s+/g,'').toLowerCase();}

async function apiGET(path){ const r=await fetch(`${API_BASE}${path}`); return r.json(); }
async function apiPOST(path,body){ const r=await fetch(`${API_BASE}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); return r.json(); }

function loadLocal(){ try{return JSON.parse(localStorage.getItem(LS_GOLDEN)||'[]');}catch(e){return [];} }
function saveLocal(c){ localStorage.setItem(LS_GOLDEN, JSON.stringify(c)); }

async function initGolden(){
  try{
    const d=await apiGET('/api/golden');
    if(d.configured){ _shared=true; _cases=d.cases||[]; }
    else { _shared=false; _cases=loadLocal(); }
  }catch(e){ _shared=false; _cases=loadLocal(); }
  document.getElementById('store-tag').textContent = _shared?'· 🌐 팀 공유 저장':'· 💾 로컬 저장(팀 공유 아님)';
  renderCases();
}
async function addCase(){
  const query=document.getElementById('g-query').value.trim();
  const makers=document.getElementById('g-makers').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!query||!makers.length){ alert('의뢰와 정답 제조원을 입력하세요'); return; }
  const item={query, inputType:document.getElementById('g-type').value, expected_makers:makers, note:document.getElementById('g-note').value.trim()};
  if(_shared){
    const d=await apiPOST('/api/golden',{action:'add',item});
    if(d.configured===false){ _shared=false; }
    else _cases=d.cases||_cases;
  }
  if(!_shared){ item.id='g'+Date.now(); item.addedAt=Date.now(); _cases.push(item); saveLocal(_cases); }
  ['g-query','g-makers','g-note'].forEach(id=>document.getElementById(id).value='');
  renderCases();
}
async function delCase(id){
  if(_shared){ const d=await apiPOST('/api/golden',{action:'delete',id}); if(d.cases) _cases=d.cases; }
  else { _cases=_cases.filter(c=>c.id!==id); saveLocal(_cases); }
  renderCases();
}
function renderCases(){
  document.getElementById('case-count').textContent=_cases.length;
  const el=document.getElementById('cases');
  if(!_cases.length){ el.innerHTML='<div class="tiny">아직 등록된 사례가 없습니다.</div>'; return; }
  el.innerHTML='<table><tr><th>의뢰</th><th>정답 제조원</th><th>메모</th><th></th></tr>'+
    _cases.map(c=>`<tr><td><b>${c.query}</b><div class="tiny">${c.inputType==='target_product'?'타겟제품':'제품유형'}</div></td>
      <td>${(c.expected_makers||[]).join(', ')}</td><td class="tiny">${c.note||'—'}</td>
      <td><button class="del" onclick="delCase('${c.id}')">삭제</button></td></tr>`).join('')+'</table>';
}

// 한 사례에 대해 엔진 후보 제조원 목록(순서 있음)을 수집
async function enginesMakers(c){
  const cls=await apiPOST('/api/classify',{input:c.query,inputType:c.inputType});
  const canonical=cls.canonical||c.query;
  const kws=[...new Set([canonical,...(cls.search_keywords||[])])];
  const out=[]; const seen=new Set();
  const add=(name)=>{ if(!name) return; const k=normName(name); if(seen.has(k)) return; seen.add(k); out.push(name); };
  // 1) 식약처 품목보고 (최우선)
  try{ const r=await apiPOST('/api/mfds-report',{query:canonical,search_keywords:kws}); (r.makers||[]).forEach(m=>add(m.manufacturer)); }catch(e){}
  // 2) 제조업체 검색 (maker만)
  try{ const r=await apiPOST('/api/search-mfr',{canonical,key_equipment:cls.key_equipment||[],search_keywords:kws}); (r.candidates||[]).filter(m=>m.entity_type==='maker').forEach(m=>add(m.name)); }catch(e){}
  // 3) 유사제품 제조원
  try{ const r=await apiPOST('/api/search-similar',{canonical,search_keywords:kws}); (r.products||[]).forEach(p=>add(p.manufacturer)); }catch(e){}
  return out;
}
function matchRank(expected, candidates){
  const e=normName(expected);
  for(let i=0;i<candidates.length;i++){ const cn=normName(candidates[i]); if(cn===e||cn.includes(e)||e.includes(cn)) return i+1; }
  return 0;
}

async function runEval(){
  if(!_cases.length){ alert('먼저 골든셋을 등록하세요'); return; }
  const btn=document.getElementById('run-btn'); btn.disabled=true;
  const prog=document.getElementById('prog');
  const rows=[]; let totRecall=0, hitCases=0, hit5Cases=0, rankSum=0, rankCnt=0;
  for(let i=0;i<_cases.length;i++){
    const c=_cases[i];
    prog.textContent=`실행 중... (${i+1}/${_cases.length}) ${c.query}`;
    let cands=[];
    try{ cands=await enginesMakers(c); }catch(e){ cands=[]; }
    const exp=c.expected_makers||[];
    const ranks=exp.map(m=>matchRank(m,cands));
    const found=ranks.filter(r=>r>0).length;
    const recall=exp.length?found/exp.length:0;
    const bestRank=Math.min(...ranks.filter(r=>r>0), Infinity);
    totRecall+=recall;
    if(found>0){ hitCases++; rankSum+=bestRank; rankCnt++; }
    if(ranks.some(r=>r>0&&r<=5)) hit5Cases++;
    rows.push({c,cands,ranks,found,recall,bestRank});
  }
  prog.textContent=`완료 (${_cases.length}건)`;
  btn.disabled=false;
  const n=_cases.length;
  document.getElementById('summary').innerHTML=`<div class="metric-row">
    <div class="metric"><div class="v">${Math.round(hitCases/n*100)}%</div><div class="l">Hit rate (정답 1개↑ 포함)</div></div>
    <div class="metric"><div class="v">${Math.round(hit5Cases/n*100)}%</div><div class="l">Hit@5 (상위5 내 포함)</div></div>
    <div class="metric"><div class="v">${(totRecall/n).toFixed(2)}</div><div class="l">평균 Recall</div></div>
    <div class="metric"><div class="v">${rankCnt?(rankSum/rankCnt).toFixed(1):'—'}</div><div class="l">평균 최고순위(적중시)</div></div>
  </div>`;
  document.getElementById('results').innerHTML='<table><tr><th>의뢰</th><th>정답/적중</th><th>최고순위</th><th>엔진 후보(상위)</th></tr>'+
    rows.map(r=>{
      const cls=r.found===r.c.expected_makers.length?'ok':r.found>0?'part':'no';
      const detail=r.c.expected_makers.map((m,idx)=>`${m}${r.ranks[idx]>0?` <span class="ok">#${r.ranks[idx]}</span>`:' <span class="no">✕</span>'}`).join('<br>');
      return `<tr><td><b>${r.c.query}</b></td>
        <td class="${cls}">${r.found}/${r.c.expected_makers.length}<div class="tiny" style="color:var(--txt2)">${detail}</div></td>
        <td>${r.bestRank===Infinity?'—':'#'+r.bestRank}</td>
        <td class="tiny">${r.cands.slice(0,8).join(', ')||'(없음)'}</td></tr>`;
    }).join('')+'</table>';
}

initGolden();
</script>
</body>
</html>
